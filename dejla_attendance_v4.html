<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Dejla Smart Lab - حضور</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --g:#6abf1e;--gd:#4e9012;--gl:#eef7e0;--gp:#f4fbec;
  --r:#e53935;--rl:#fdecea;
  --bg:#f0f2ee;--t:#2a3020;--m:#7a8572;--b3:#e4e8e0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:"Cairo",sans-serif;background:var(--gp);}
body{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;padding:0 0 32px;}

/* HEADER */
.hdr{width:100%;background:white;padding:16px;display:flex;flex-direction:column;align-items:center;border-bottom:2px solid var(--gl);box-shadow:0 2px 8px rgba(78,144,18,.1);}
.hdr img{width:72px;height:72px;border-radius:16px;padding:6px;background:white;box-shadow:0 2px 12px rgba(78,144,18,.18);}
.hdr h1{color:var(--gd);font-size:1.1rem;font-weight:900;margin-top:8px;}
.hdr p{color:var(--m);font-size:.75rem;}

/* STEPS */
.step{display:none;width:100%;max-width:420px;padding:16px;}
.step.on{display:block;}
.card{background:white;border-radius:20px;padding:18px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.06);border:1.5px solid var(--b3);}
.stitle{font-weight:900;font-size:.95rem;color:var(--t);margin-bottom:14px;}

/* FORM */
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:.7rem;font-weight:700;color:var(--m);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px;}
.fg input,.fg select{width:100%;padding:12px 14px;border:2px solid var(--b3);border-radius:12px;font-family:"Cairo",sans-serif;font-size:.95rem;color:var(--t);background:#fafafa;outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus{border-color:var(--g);background:white;}

/* BUTTONS */
.btn{width:100%;padding:14px;border:none;border-radius:14px;font-family:"Cairo",sans-serif;font-size:.95rem;font-weight:900;cursor:pointer;transition:all .2s;}
.bng{background:linear-gradient(135deg,#6abf1e,#4e9012);color:white;box-shadow:0 4px 12px rgba(78,144,18,.3);}
.bno{background:white;border:2px solid var(--b3);color:var(--m);margin-top:8px;}
.btn:active{transform:scale(.98);}

/* EMP INFO */
.emp-card{background:linear-gradient(135deg,var(--gp),var(--gl));border:2px solid var(--g);border-radius:18px;padding:16px;margin-bottom:14px;text-align:center;}
.emp-avatar{width:56px;height:56px;border-radius:50%;background:var(--g);color:white;font-size:1.4rem;font-weight:900;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;}
.emp-name{font-size:1rem;font-weight:900;color:var(--t);}
.emp-sub{font-size:.75rem;color:var(--m);margin-top:3px;}
.emp-code{display:inline-block;background:var(--gd);color:white;border-radius:20px;padding:3px 12px;font-size:.75rem;font-weight:700;margin-top:6px;}

/* TIMING BADGE */
.timing-late{background:var(--rl);color:var(--r);border-radius:12px;padding:8px 14px;font-size:.82rem;font-weight:700;margin-bottom:12px;text-align:center;}
.timing-ot{background:var(--gl);color:var(--gd);border-radius:12px;padding:8px 14px;font-size:.82rem;font-weight:700;margin-bottom:12px;text-align:center;}
.timing-ok{background:#e3f2fd;color:#1565c0;border-radius:12px;padding:8px 14px;font-size:.82rem;font-weight:700;margin-bottom:12px;text-align:center;}

/* ATT BUTTONS */
.att-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.att-in{background:linear-gradient(135deg,#6abf1e,#4e9012);color:white;border:none;border-radius:14px;padding:16px;font-family:"Cairo",sans-serif;font-size:.92rem;font-weight:900;cursor:pointer;transition:all .2s;}
.att-out{background:linear-gradient(135deg,#e53935,#c62828);color:white;border:none;border-radius:14px;padding:16px;font-family:"Cairo",sans-serif;font-size:.92rem;font-weight:900;cursor:pointer;transition:all .2s;}
.att-in:active,.att-out:active{transform:scale(.97);}

/* TIME DISPLAY */
.clock{text-align:center;font-size:1.4rem;font-weight:900;color:var(--gd);margin-bottom:6px;}
.clock-sub{text-align:center;font-size:.72rem;color:var(--m);}

/* REQUEST TABS */
.req-tabs{display:flex;gap:8px;margin-bottom:14px;}
.rtab{flex:1;padding:9px;border:2px solid var(--b3);border-radius:12px;background:white;font-family:"Cairo",sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;color:var(--m);text-align:center;transition:all .2s;}
.rtab.on{background:var(--gl);border-color:var(--g);color:var(--gd);}
.req-form{display:none;}
.req-form.on{display:block;}

/* SUCCESS */
.success-box{text-align:center;padding:20px;}
.success-icon{font-size:3rem;margin-bottom:10px;}
.success-title{font-size:1.1rem;font-weight:900;color:var(--gd);}
.success-sub{font-size:.8rem;color:var(--m);margin-top:4px;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(120px);background:#2a3020;color:white;border-radius:14px;padding:12px 20px;font-size:.85rem;font-weight:700;transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* LOADING */
.ld-wrap{display:flex;justify-content:center;align-items:center;gap:8px;padding:20px;}
.ld{width:10px;height:10px;border-radius:50%;background:var(--g);animation:ldp 1s ease-in-out infinite;}
.ld:nth-child(2){animation-delay:.2s}.ld:nth-child(3){animation-delay:.4s}
@keyframes ldp{0%,100%{transform:scale(.5);opacity:.4}50%{transform:scale(1.2);opacity:1}}

.sp{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:4px;}
@keyframes spin{to{transform:rotate(360deg)}}
.powered{text-align:center;font-size:.7rem;color:var(--m);padding:16px;margin-top:8px;}
.powered b{color:var(--gd);}
</style>
</head>

</div>

<script>
var APPS="https://script.google.com/macros/s/AKfycby1guPfRIcNbXHMzmpSIBDK-Ow6_vzbpeMEzwCBRkT86HT_LShQ3g27zlilkmhePi-X5A/exec";
var empData=null;
var clockTimer=null;

// ── CLOCK ──
function startClock(){
  updateClock();
  clockTimer=setInterval(updateClock,1000);
}
function updateClock(){
  var now=new Date();
  var h=String(now.getHours()).padStart(2,"0");
  var m=String(now.getMinutes()).padStart(2,"0");
  var s=String(now.getSeconds()).padStart(2,"0");
  document.getElementById("clockDisp").textContent=h+":"+m+":"+s;
  updateTimingBadge(h+":"+m);
}
function updateTimingBadge(timeStr){
  if(!empData)return;
  var b=document.getElementById("timingBadge");
  var now=toMins(timeStr);
  var start=toMins(empData.shiftStart);
  var end=toMins(empData.shiftEnd);
  var lateBy=now-start;
  var otBy=now-end-15;
  if(lateBy>=5&&lateBy<start+60){
    var label=lateBy>=30?"خصم يوم كامل ⛔":lateBy>=15?"خصم نص يوم ⚠️":lateBy>=10?"خصم ساعة ⚠️":"خصم 10 دقائق";
    b.innerHTML='<div class="timing-late">⏰ تأخير '+lateBy+' دقيقة — '+label+'</div>';
  } else if(otBy>0){
    b.innerHTML='<div class="timing-ot">🌟 أوفر تايم '+Math.round(otBy)+' دقيقة</div>';
  } else {
    b.innerHTML='<div class="timing-ok">✅ في الموعد</div>';
  }
}
function toMins(t){if(!t)return 0;var p=t.split(":");return parseInt(p[0]||0)*60+parseInt(p[1]||0);}

// ── VERIFY ──
function verifyEmp(){
  var name=document.getElementById("empName").value.trim();
  var code=document.getElementById("empCode").value.trim().toUpperCase();
  var branch=document.getElementById("empBranch").value;
  var shift=document.getElementById("empShift").value;
  if(!name||name.split(" ").filter(Boolean).length<3){toast("⚠️ أدخل الاسم الثلاثي كاملاً");return;}
  if(!code){toast("⚠️ أدخل كود الموظف");return;}
  if(!branch){toast("⚠️ اختر الفرع");return;}
  if(!shift){toast("⚠️ اختر الشيفت");return;}
  var btn=document.getElementById("verifyBtn");
  btn.disabled=true; btn.innerHTML='<span class="sp"></span>جاري التحقق...';
  fetch(APPS+"?action=verifyEmployee&name="+encodeURIComponent(name)+"&code="+encodeURIComponent(code))
  .then(function(r){return r.json();})
  .then(function(d){
    btn.disabled=false; btn.textContent="تحقق من الهوية";
    if(!d.valid){toast("❌ بيانات غير صحيحة أو الموظف غير نشط");return;}
    // مواعيد الشيفت من بيانات الفرع المختار
    var SHIFTS={
      "فرع كورنيش طرة":   {"شيفت 1":{s:"10:00",e:"16:00"},"شيفت 2":{s:"16:00",e:"22:00"}},
      "فرع زهراء المعادي":{"شيفت 1":{s:"10:00",e:"16:00"},"شيفت 2":{s:"16:00",e:"22:30"}},
      "فرع كوتسيكا":      {"شيفت 1":{s:"09:00",e:"16:00"},"شيفت 2":{s:"16:00",e:"23:00"}}
    };
    var times=(SHIFTS[branch]&&SHIFTS[branch][shift])||{s:"10:00",e:"22:00"};
    empData=d;
    empData.selectedBranch=branch;
    empData.selectedShift=shift;
    empData.shiftStart=times.s;
    empData.shiftEnd=times.e;
    document.getElementById("empAvatar").textContent=d.name.trim().charAt(0);
    document.getElementById("empNameDisp").textContent=d.name;
    document.getElementById("empBranchDisp").textContent=branch+" • "+shift;
    document.getElementById("empCodeDisp").textContent=d.code;
    document.getElementById("shiftDisp").textContent="الشيفت: "+times.s+" — "+times.e;
    showStep("step2"); startClock();
  }).catch(function(){
    btn.disabled=false; btn.textContent="تحقق من الهوية";
    toast("❌ تعذر الاتصال، حاول مجدداً");
  });
}

// ── REGISTER ──
function register(action){
  if(!empData)return;
  var btn=action==="حضور"?document.getElementById("btnIn"):document.getElementById("btnOut");
  btn.disabled=true;
  var now=new Date();
  var timeStr=String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
  var start=toMins(empData.shiftStart);
  var end=toMins(empData.shiftEnd);
  var cur=toMins(timeStr);
  var timing="";
  if(action==="حضور"){var late=cur-start;if(late>=5)timing="تأخير "+late+" دقيقة";}
  else{var ot=cur-end-15;if(ot>0)timing="أوفر تايم "+Math.round(ot)+" دقيقة";}
  fetch(APPS,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action:"recordAttendance",name:empData.name,code:empData.code,branch:empData.selectedBranch,shift:empData.selectedShift,action:action,timing:timing})
  }).then(function(){
    btn.disabled=false;
    document.getElementById("succIcon").textContent=action==="حضور"?"🟢":"🔴";
    document.getElementById("succTitle").textContent="تم تسجيل "+action+" بنجاح!";
    document.getElementById("succSub").textContent=empData.name+" — "+timeStr+(timing?" — "+timing:"");
    playSound(action==="حضور"?"in":"out");
    showStep("step4");
  }).catch(function(){btn.disabled=false;toast("❌ تعذر التسجيل");});
}

// ── REQUESTS ──
function switchTab(t){
  ["salary","leave"].forEach(function(x){
    document.getElementById("tab-"+x).classList.toggle("on",x===t);
    document.getElementById("form-"+x).classList.toggle("on",x===t);
  });
}
function sendSalary(){
  var amt=document.getElementById("salAmount").value;
  if(!amt){toast("⚠️ أدخل المبلغ");return;}
  fetch(APPS,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action:"addRequest",type:"salary",employeeName:empData.name,employeeCode:empData.code,branch:empData.selectedBranch,amount:amt,reason:document.getElementById("salReason").value})
  }).then(function(){toast("✅ تم إرسال طلب السلفة!");document.getElementById("salAmount").value="";document.getElementById("salReason").value="";})
  .catch(function(){toast("❌ تعذر الإرسال");});
}
function sendLeave(){
  var reason=document.getElementById("leaveReason").value.trim();
  if(!reason){toast("⚠️ أدخل سبب الإذن");return;}
  fetch(APPS,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({action:"addRequest",type:"leave",employeeName:empData.name,employeeCode:empData.code,branch:empData.selectedBranch,leaveReason:reason,leaveDuration:document.getElementById("leaveDur").value,leaveNote:document.getElementById("leaveNote").value})
  }).then(function(){toast("✅ تم إرسال طلب الإذن!");document.getElementById("leaveReason").value="";document.getElementById("leaveNote").value="";})
  .catch(function(){toast("❌ تعذر الإرسال");});
}

// ── SOUND ──
function playSound(type){
  // اهتزاز
  try{
    if(navigator.vibrate){
      navigator.vibrate(type==="in"?[80,40,80]:[120]);
    }
  }catch(e){}
  // صوت ناعم
  try{
    var c=new(window.AudioContext||window.webkitAudioContext)();
    // resume عشان iOS
    if(c.state==="suspended")c.resume();
    var o=c.createOscillator();
    var g=c.createGain();
    var comp=c.createDynamicsCompressor();
    o.connect(g);g.connect(comp);comp.connect(c.destination);
    o.type="sine";
    if(type==="in"){
      // نغمة صاعدة ناعمة - حضور
      o.frequency.setValueAtTime(392,c.currentTime);
      o.frequency.linearRampToValueAtTime(523,c.currentTime+.15);
      o.frequency.linearRampToValueAtTime(659,c.currentTime+.3);
      g.gain.setValueAtTime(0,c.currentTime);
      g.gain.linearRampToValueAtTime(0.25,c.currentTime+.05);
      g.gain.setValueAtTime(0.25,c.currentTime+.25);
      g.gain.linearRampToValueAtTime(0,c.currentTime+.5);
      o.start(c.currentTime);o.stop(c.currentTime+.5);
    } else {
      // نغمة هابطة ناعمة - انصراف
      o.frequency.setValueAtTime(523,c.currentTime);
      o.frequency.linearRampToValueAtTime(392,c.currentTime+.2);
      o.frequency.linearRampToValueAtTime(330,c.currentTime+.4);
      g.gain.setValueAtTime(0,c.currentTime);
      g.gain.linearRampToValueAtTime(0.2,c.currentTime+.05);
      g.gain.setValueAtTime(0.2,c.currentTime+.3);
      g.gain.linearRampToValueAtTime(0,c.currentTime+.55);
      o.start(c.currentTime);o.stop(c.currentTime+.55);
    }
  }catch(e){}
}

// ── NAV ──
function showStep(id){document.querySelectorAll(".step").forEach(function(s){s.classList.remove("on");});document.getElementById(id).classList.add("on");window.scrollTo(0,0);}
function goAtt(){showStep("step2");}
function goReq(){showStep("step3");}
function logout(){
  if(clockTimer)clearInterval(clockTimer);
  empData=null;
  document.getElementById("empName").value="";
  document.getElementById("empCode").value="";
  document.getElementById("empBranch").value="";
  document.getElementById("empShift").value="";
  showStep("step1");
}

// ── TOAST ──
var tt;
function toast(msg){clearTimeout(tt);var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");tt=setTimeout(function(){t.classList.remove("show");},3200);}
</script>
